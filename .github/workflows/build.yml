name: Build yay module

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      ndk_version:
        description: "Android NDK version"
        required: true
        default: "26.3.11579264"
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK + NDK ${{ inputs.ndk_version }}
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools ndk;${{ inputs.ndk_version }}"

      - name: Bun Setup
        uses: oven-sh/setup-bun@v2

      - name: Point build.sh at the installed NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ inputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Build (${{ inputs.build_type }})
        run: |
          chmod +x build.sh
          ./build.sh "${{ inputs.build_type }}"

      - name: Verify binaries
        run: |
          file bin/yay_apply bin/yay_watch
          # Sanity: both must be ARM64, both must exist and be non-empty.
          for bin in bin/yay_apply bin/yay_watch; do
            [ -s "$bin" ] || { echo "::error::$bin is missing or empty"; exit 1; }
            file "$bin" | grep -q "ARM aarch64" || { echo "::error::$bin is not ARM64"; exit 1; }
          done

      - name: Build WebUI
        working-directory: src/yay-webui
        run: |
          bun install
          bun run build
          mkdir -p ../../webroot
          cp -r ./dist/* ../../webroot/

      - name: Read module version
        id: ver
        run: |
          version=$(grep -m1 '^version=' module.prop | cut -d= -f2)
          versionCode=$(grep -m1 '^versionCode=' module.prop | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_code=$versionCode" >> "$GITHUB_OUTPUT"

      - name: Stage flashable module
        run: |
          stage=staging/yay
          mkdir -p "$stage"

          # Only what customize.sh / Magisk's installer actually needs at
          # flash time — source, build config, and dev tooling are
          # intentionally left out (see README's "Module structure" section).
          cp -r bin "$stage/"
          cp -r config "$stage/"
          cp -r META-INF "$stage/"
          cp -r webroot "$stage/"
          cp module.prop "$stage/"
          cp customize.sh "$stage/"
          cp post-fs-data.sh "$stage/"
          cp service.sh "$stage/"

          chmod 755 "$stage"/bin/yay_apply "$stage"/bin/yay_watch
          chmod 755 "$stage"/customize.sh "$stage"/post-fs-data.sh "$stage"/service.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # upload-artifact v4 zips the directory automatically — uploading
          # a pre-made .zip would produce a .zip inside a .zip on download.
          # The artifact name becomes the downloaded filename + .zip.
          name: yay-${{ steps.ver.outputs.version }}-${{ inputs.build_type }}
          path: staging/yay/
          retention-days: 30
          if-no-files-found: error
